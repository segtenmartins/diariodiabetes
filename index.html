<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Diário Nutricional - João</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.5; background-color: #f9f7f2; color: #333; }
        h1 { color: #2c3e50; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .input-group { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc; display: flex; flex-wrap: wrap; gap: 10px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 120px; }
        button { padding: 8px 15px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; flex-shrink: 0; }
        button:hover { background-color: #219150; }
    </style>
</head>
<body>
    <h1>Registro Alimentar (5W2H)</h1>
    <div class="input-group">
        <input type="text" id="alimento" placeholder="Alimento (What)">
        <input type="text" id="local" placeholder="Local (Where)">
        <input type="time" id="horario" placeholder="Horário (When)">
        <input type="text" id="objetivo" placeholder="Objetivo (Why)">
        <input type="number" id="carb" placeholder="Carb (g)">
        <input type="number" id="prot" placeholder="Prot (g)">
        <input type="number" id="gord" placeholder="Gord (g)">
        <button onclick="adicionar()">Adicionar</button>
    </div>

    <table>
        <thead>
            <tr><th>Alimento</th><th>Local</th><th>Horário</th><th>Objetivo</th><th>Carb</th><th>Prot</th><th>Gord</th></tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
        <tfoot>
            <tr><th colspan="4">Total</th><th id="totalCarb">0</th><th id="totalProt">0</th><th id="totalGord">0</th></tr>
        </tfoot>
    </table>

    <script>
        let tC=0, tP=0, tG=0;
        function adicionar() {
            let alimento = document.getElementById('alimento').value;
            let local = document.getElementById('local').value;
            let horario = document.getElementById('horario').value;
            let objetivo = document.getElementById('objetivo').value;
            let c = parseFloat(document.getElementById('carb').value) || 0;
            let p = parseFloat(document.getElementById('prot').value) || 0;
            let g = parseFloat(document.getElementById('gord').value) || 0;
            
            tC += c; tP += p; tG += g;
            
            let row = '<tr><td>' + alimento + '</td><td>' + local + '</td><td>' + horario + '</td><td>' + objetivo + '</td><td>' + c + '</td><td>' + p + '</td><td>' + g + '</td></tr>';
            document.getElementById('corpoTabela').innerHTML += row;
            
            document.getElementById('totalCarb').innerText = tC;
            document.getElementById('totalProt').innerText = tP;
            document.getElementById('totalGord').innerText = tG;
        }
    </script>
</body>
</html>
